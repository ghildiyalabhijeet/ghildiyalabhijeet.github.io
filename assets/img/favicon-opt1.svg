<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFA0" />
      <stop offset="100%" stop-color="#C88CFF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="24" fill="#040A12" />
  <text x="50" y="72" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="64" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">A</text>
</svg>
